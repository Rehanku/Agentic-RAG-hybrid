version: "3.9"

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: deepread-backend:local
    container_name: deepread-backend
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - RERANKER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2
      - GEMINI_MODEL=gemini-2.5-flash
    volumes:
      # Mount a local indexes directory so data survives container restarts
      - ./backend/indexes:/app/indexes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s    # Allow time for model loading

  # ── React frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    image: deepread-frontend:local
    container_name: deepread-frontend
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
